<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — CAN Beyanname</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1B2B4B;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.kart{background:white;border-radius:16px;padding:32px;width:100%;max-width:380px}
h1{font-size:20px;font-weight:700;color:#1B2B4B;margin-bottom:4px}
p{font-size:13px;color:#64748B;margin-bottom:24px}
label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
input{width:100%;height:44px;border:1px solid #E2E8F0;border-radius:8px;padding:0 14px;font-size:15px;outline:none;margin-bottom:16px}
input:focus{border-color:#1B2B4B}
button{width:100%;height:44px;background:#1B2B4B;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.hata{background:#FEE2E2;color:#991B1B;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="kart">
  <h1>CAN Mali Müşavirlik</h1>
  <p>{{ 'Şifrenizi girin' if kayitli else 'İlk girişte şifre belirleyin' }}</p>
  {% if hata %}<div class="hata">{{ hata }}</div>{% endif %}
  <form method="POST">
    <label>Şifre</label>
    <input type="password" name="sifre" autofocus placeholder="••••••••">
    <button type="submit">{{ 'Giriş Yap' if kayitli else 'Şifre Belirle ve Giriş' }}</button>
  </form>
</div>
</body>
</html>
